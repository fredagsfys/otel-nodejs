# Supporting observability stack used to test the OpenTelemetry template.
# Not part of what you ship — it just lets you see traces/metrics/logs locally.
# Images are pinned to specific stable versions for reproducibility (avoid :latest).
name: otel-nodejs

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.152.1
    container_name: otel-collector
    command: ['--config=/etc/otel-collector-config.yaml']
    ports:
      # gRPC receivers
      - '4317:4317'
      # HTTP receivers
      - '4318:4318'
      # Metrics exported for Prometheus scraping
      - '9464:9464'
      # Health check
      - '13133:13133'
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    depends_on:
      - tempo
      - loki

  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    command: ['-config.file=/etc/tempo.yaml']
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - '3200:3200'

  loki:
    image: grafana/loki:3.7.2
    container_name: loki
    command: ['-config.file=/etc/loki/local-config.yaml']
    ports:
      - '3100:3100'

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    ports:
      - '3000:3000'
    depends_on:
      - prometheus
      - tempo
      - loki
